services:
  api:
    build: .
    expose:
      - "8000"
    env_file: .env
    depends_on:
      - mongodb
      - redis
    networks:
      - dokploy-network
      - default

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - default

  redis:
    image: redis:7-alpine
    networks:
      - default

volumes:
  mongo_data:

networks:
  dokploy-network:
    external: true
